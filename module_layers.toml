# module_layers.toml -- Checkmk module layer architecture rules
#
# Defines which components may import from which other components.
# Enforced by astrein's cmk-module-layer-violation checker.
#
# Syntax:
#   "@group_name" in allows/excludes expands to the group defined in [groups]
#   Self-imports (component importing from itself) are always allowed implicitly.

[groups]
plugin_apis = [
  "cmk.agent_based.internal",
  "cmk.agent_based.legacy",
  "cmk.agent_based.prediction_backend",
  "cmk.agent_based.v1",
  "cmk.agent_based.v2",
  "cmk.bakery.v2_unstable",
  "cmk.dcd_connector_parameters.internal",
  "cmk.dcd_connectors.internal",
  "cmk.graphing.v1",
  "cmk.inventory_ui.v1_unstable",
  "cmk.password_store.v1_unstable",
  "cmk.rulesets.internal",
  "cmk.rulesets.v1",
  "cmk.server_side_calls.internal",
  "cmk.server_side_calls.v1",
  "cmk.server_side_programs.v1_unstable",
]

ccc = ["cmk.ccc"]

messaging = ["cmk.messaging"]

mkp_tool = ["cmk.mkp_tool"]

werks = ["cmk.werks"]

crypto = ["cmk.crypto"]

trace = ["cmk.trace"]

metric_backend = ["cmk.metric_backend"]

livestatus_client = ["cmk.livestatus_client"]

relay_protocols = ["cmk.relay_protocols"]


[plugin_families]
# These are ready to be moved to a package. PLEASE DO NOT INTRODUCE NEW DEPENDENCIES!
clean = [
  "acme",
  "activemq",
  "alertmanager",
  "allnet_ip_sensoric",
  "appdynamics",
  "aws",
  "azure",
  "azure_status",
  "bazel",
  "cisco",
  "cisco_meraki",
  "couchbase",
  "ddn_s2a",
  "fritzbox",
  "gerrit",
  "hivemanager",
  "hivemanager_ng",
  "hp_msa",
  "hpe_3par",
  "ibmsvc",
  "innovaphone",
  "jenkins",
  "jira",
  "mobileiron",
  "mqtt",
  "prometheus",
  "ruckus_spot",
  "salesforce",
  "siemens_plc",
  "smb",
  "storeonce",
  "storeonce4x",
  "tinkerforge",
  "zerto",
]
# Not yet clean:
# azure_v2 — Edition, HostAddress
# datadog — bypasses APIs to talk to the EC
# gcp — Edition
# jolokia — import hack, resolve by migrating the bakery plugin
# metric_backend — cmk.metric_backend, cmk.utils.paths
# otel
# vnx_quotas — TODO: make the authorized keys configurable?

# Plugin families that refuse to play by the rules.

[plugin_families.violations.azure_deprecated]
allows = [
  # FIXME
  "cmk.agent_based.v1",
  # edition detection
  "cmk.ccc.version",
  # FormSpec validation
  "cmk.ccc.hostaddress",
  # FIXME
  "cmk.plugins.azure.lib",
  "cmk.utils.http_proxy_config",
  # edition detection
  "cmk.utils.paths",
]

[plugin_families.violations.azure_v2]
allows = [
  # FIXME
  "cmk.agent_based.v1",
]

# These plugins are tightly coupled to Checkmk.
# We cannot expect them to not depend on the core product.
[plugin_families.violations.checkmk]
allows = [
  # FIXME
  "cmk.agent_based.v1",
  "cmk.base",
  "cmk.bi",
  "cmk.ccc",
  "cmk.checkengine",
  "cmk.fetchers",
  "cmk.gui",
  "cmk.server_side_calls_backend",
  "cmk.utils",
]

# This hosts internal plugins. They can not be subjected to
# any common dependency restrictions.
[plugin_families.violations.dcd]
allows = ["@ccc", "cmk.dcd", "cmk.gui.config", "cmk.post_rename_site.internal"]

[plugin_families.violations.otel_collector]
allows = [
  "@ccc",
  "cmk.gui.config",
  "cmk.gui.nonfree.ultimate.otel_collector",
  "cmk.gui.watolib.changes",
  "cmk.post_rename_site.internal",
]

[plugin_families.violations.custom_query_metric_backend]
allows = [
  "cmk.metric_backend",
  "cmk.nonfree.ultimate.metric_backend.gui._metric_backend_custom_query",
  "cmk.utils.macros",
  "cmk.utils.paths",
]

[plugin_families.violations.datadog]
allows = [
  "cmk.ccc.store",
  # edition detection
  "cmk.ccc.version",
  "cmk.ec.syslog",
  "cmk.gui.mkeventd",
  "cmk.utils.http_proxy_config",
  # edition detection
  "cmk.utils.paths",
]

[plugin_families.violations.emailchecks]
