[project]
name = "cmk-dev-deploy"
version = "1.0.0"
requires-python = ">=3.12"
dynamic = ["dependencies"]

[project.scripts]
cmk-dev-deploy = "cmk.dev_deploy.__main__:main"

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.dynamic]
dependencies = { file = ["requirements.txt"] }

[tool.bandit]
