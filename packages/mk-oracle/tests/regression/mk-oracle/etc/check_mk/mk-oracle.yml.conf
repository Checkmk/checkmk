---
oracle:
  main:
    connection: # mandatory
      hostname: $DB_HOST
      port: $DB_PORT
      service_name: $DB_SERVICE_NAME
    authentication: # mandatory
      username: $DB_USER      
      password: $DB_PASSWORD  
      type: standard
    discovery:
      detect: no
    cache_age: 600
    custom_metrics_cache_age: 600
    $INDIVIDUAL_SECTIONS:
    - $DB_SECTION:
        is_async: no
    $ALL_SECTIONS: 
    - instance:
    - sessions:
    - logswitches:
    - undostat: 
    - recovery_area:
    - processes:
    - recovery_status:
    - longactivesessions:
    - dataguard_stats:
    - performance:
    - locks:
    - systemparameter: